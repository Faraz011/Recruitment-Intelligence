services:
  - type: web
    name: recruitment-intelligence-backend
    env: python
    plan: free
    buildCommand: pip install --only-binary=:all: -r backend/requirements.txt 2>/dev/null || pip install --no-build-isolation -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    pythonVersion: 3.11.9
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PIP_ONLY_BINARY
        value: ":all:"
